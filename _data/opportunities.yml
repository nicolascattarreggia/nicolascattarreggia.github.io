intro: >-
  I welcome motivated students and early-career researchers interested in structural engineering, structural response under extreme loadings (e.g., impacts, explosions), seismic risk, existing structures, bridges, advanced numerical modelling and sustainable retrofit strategies. The topics below indicate possible directions rather than fixed calls.

contact_note: >-
  Interested students or collaborators are encouraged to send a short CV and a brief description of their interests by e-mail.
