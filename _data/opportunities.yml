intro: >-
  I welcome motivated students and early-career researchers interested in structural engineering, structural response under extreme loading scenarios, such as impacts and explosions, seismic risk, existing structures, bridges, advanced numerical modelling, and sustainable retrofit strategies. The topics indicated in the Research section should be considered as possible research directions rather than fixed calls.

Opportunities for international exchange during thesis development and research collaborations are also open, including with leading universities in the United States, Canada, and the United Kingdom.

contact_note: >-
  Interested students or collaborators are encouraged to send a short CV and a brief description of their interests by e-mail.
