intro: >-
  I welcome motivated students and early-career researchers interested in structural engineering, seismic risk, existing infrastructure, advanced numerical modelling and sustainable retrofit strategies. The topics below indicate possible directions rather than fixed calls.

opportunities:
  - title: "MSc thesis topics"
    description: >-
      Possible thesis topics include seismic assessment of existing bridges and buildings, prioritisation methods for bridge portfolios, life-cycle sustainability of retrofit strategies, indirect impacts of infrastructure downtime, and numerical modelling of structural response under extreme loading.

  - title: "PhD and visiting students"
    description: >-
      Prospective PhD candidates and visiting students interested in bridge risk, collapse modelling, sustainable infrastructure management, forensic structural engineering or performance-based assessment are welcome to get in touch to discuss potential research directions.

  - title: "Research and industry collaborations"
    description: >-
      I am interested in collaborations with academic, institutional and professional partners on structural assessment, bridge management, seismic risk mitigation, forensic analysis and decision-support tools for existing infrastructure.

contact_note: >-
  Interested students or collaborators are encouraged to send a short CV and a brief description of their interests by e-mail.
