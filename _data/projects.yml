- short_name: "SONATA"
  status: "current"
  title: "Sensor-driven statistical tools to evaluate risks and manage safety in the built environment"
  url: ""
  logo: "/images/projects/sonata.png"
  period: "Oct 2025 – Sept 2028"
  role: "Principal Investigator"
  funding: "Starting Grant – Fondo Italiano per la Scienza (FIS)"
  funding_url: ""
  description: "The SONATA project aims to improve earthquake safety in Italy’s built environment, with a special focus on non-structural elements that significantly impact economic losses and recovery. Using innovative tools like shaking-table tests, sensors, AI, and image recognition, the project will develop advanced methods to assess seismic damage and support effective risk management and decision-making."

