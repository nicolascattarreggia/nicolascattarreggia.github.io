{% assign teaching_data = site.data.teaching %}

<style>
  .archive {
    width: 80%;
    margin: 0 auto;
    float: none;
    padding-right: 0;
  }

  @media (min-width: 80em) {
    .archive {
      width: 70%;
    }
  }

  .teaching-year-block {
    margin-bottom: 1.2rem;
  }

  .teaching-year-summary {
    cursor: pointer;
    list-style: none;
    background: #e9ebef;
    border-left: 3px solid #8d2332;
    border-radius: 18px;
    padding: 1rem 1.1rem;
    color: #2f3445;
    font-weight: 700;
    font-size: 1.15rem;
  }

  .teaching-year-summary::-webkit-details-marker {
    display: none;
  }

  .teaching-year-title {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .teaching-year-title::before {
    content: "▶";
    font-size: 1rem;
    color: #4b5563;
    transition: transform 0.2s ease;
    display: inline-block;
  }

  details[open] > .teaching-year-summary .teaching-year-title::before {
    transform: rotate(90deg);
  }

  .teaching-year-content {
    background: #f3f4f6;
    border-left: 3px solid #8d2332;
    border-radius: 24px;
    margin-top: 0.8rem;
    padding: 1rem 1.2rem;
  }

  .teaching-item-row {
    padding: 0.9rem 0;
  }

  .teaching-item-row-bordered {
    border-bottom: 1px solid #d8dbe2;
  }

  .teaching-item-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .teaching-item-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #4a4a4a;
    line-height: 1.3;
  }

  .teaching-item-badges {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .teaching-badge {
    display: inline-block;
    border-radius: 999px;
    padding: 0.35rem 0.8rem;
    font-size: 0.95rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .teaching-badge-role {
    background: #8d2332;
    color: #ffffff;
  }

  .teaching-badge-hours {
    background: #e9ebef;
    color: #2f3445;
  }

  .teaching-item-grid {
    display: grid;
    grid-template-columns: 130px 1fr;
    row-gap: 0.9rem;
    column-gap: 1.4rem;
  }

  .teaching-label {
    color: #7a7a7a;
    font-size: 0.98rem;
  }

  .teaching-value {
    color: #4f5560;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.4;
  }

  @media (max-width: 768px) {
    .teaching-item-top {
      flex-direction: column;
    }

    .teaching-item-badges {
      justify-content: flex-start;
    }

    .teaching-item-grid {
      grid-template-columns: 1fr;
      row-gap: 0.35rem;
    }

    .teaching-label {
      margin-top: 0.35rem;
      font-weight: 600;
    }
  }
</style>

<div class="cv-container">
  <div class="cv-content">
    {% for section in teaching_data %}
      {% include teaching-section.html section=section %}
    {% endfor %}
  </div>
</div>
