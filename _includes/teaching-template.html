{% assign teaching_data = site.data.teaching %}

<style>
  .teaching-year-block {
    background: #f3f4f6;
    border-left: 3px solid #8d2332;
    border-radius: 18px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .teaching-year-block[open] {
    padding-bottom: 0.45rem;
  }

  .teaching-year-summary {
    cursor: pointer;
    list-style: none;
    background: #e9ebef;
    padding: 0.7rem 1.2rem;
    margin: 0;
    color: #4a4a4a;
    font-weight: 700;
    font-size: 1.05rem;
    line-height: 1.25;
  }

  .teaching-year-summary::-webkit-details-marker {
    display: none;
  }

  .teaching-year-title {
    display: flex;
    align-items: center;
    gap: 0.55rem;
  }

  .teaching-year-title::before {
    content: "▶";
    font-size: 0.9rem;
    color: #4b5563;
    transition: transform 0.2s ease;
    display: inline-block;
  }

  details[open] > .teaching-year-summary .teaching-year-title::before {
    transform: rotate(90deg);
  }

  .teaching-year-content {
    background: transparent;
    border-left: 0;
    border-radius: 0;
    margin-top: 0;
    padding: 0.7rem 1rem 0.4rem 1rem;
  }

  .teaching-item-row {
    padding: 0.75rem 0;
  }

  .teaching-item-row-bordered {
    border-bottom: 1px solid #d8dbe2;
  }

  .teaching-item-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 0.45rem;
  }

  .teaching-item-title {
    font-size: 1rem;
    font-weight: 700;
    color: #4a4a4a;
    line-height: 1.3;
  }

  .teaching-item-badges {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .teaching-badge {
    display: inline-block;
    border-radius: 999px;
    padding: 0.2rem 0.55rem;
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
  }

  .teaching-badge-role {
    background: #8d2332;
    color: #ffffff;
  }

  .teaching-badge-hours {
    background: #e9ebef;
    color: #4a4a4a;
  }

  .teaching-item-grid {
    display: grid;
    grid-template-columns: 110px 1fr;
    row-gap: 0.35rem;
    column-gap: 0.9rem;
  }

  .teaching-label {
    color: #6b7280;
    font-size: 0.92rem;
    line-height: 1.35;
  }

  .teaching-value {
    color: #4f5560;
    font-size: 0.96rem;
    font-weight: 500;
    line-height: 1.35;
  }

  @media (max-width: 768px) {
    .teaching-item-top {
      flex-direction: column;
      align-items: flex-start;
    }

    .teaching-item-badges {
      justify-content: flex-start;
    }

    .teaching-item-grid {
      grid-template-columns: 1fr;
      row-gap: 0.2rem;
    }

    .teaching-label {
      margin-top: 0.2rem;
      font-weight: 600;
    }
  }
</style>

<div class="cv-wrapper">
  {% for section in teaching_data %}
    {% include teaching-section.html section=section is_first=forloop.first %}
  {% endfor %}
</div>
