{% assign teaching_data = site.data.teaching %}

<style>
  .archive {
    width: 80%;
    margin: 0 auto;
    float: none;
    padding-right: 0;
  }

  @media (min-width: 80em) {
    .archive {
      width: 70%;
    }
  }
</style>

<div class="cv-container">
  <div class="cv-header-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
    <h1 style="margin-bottom:0;">Teaching</h1>
  </div>

  {% include teaching-nav.html data=teaching_data %}

  <div class="cv-content">
    {% for section in teaching_data %}
      {% include teaching-section.html section=section %}
    {% endfor %}
  </div>
</div>
